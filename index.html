<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: linear-gradient(#70c5ce, #d0f4ff);
  font-family: Arial;
}

canvas {
  display: block;
}

/* score top left */
#score {
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 22px;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.4);
}

/* GAME OVER SCREEN */
#gameOverScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.4);
  color: white;
  text-align: center;
}

#finalScore {
  font-size: 40px;
  margin-bottom: 10px;
}

#tapText {
  font-size: 18px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="score">0</div>

<div id="gameOverScreen">
  <div id="finalScore">0</div>
  <div id="tapText">Tap to restart</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScore = document.getElementById("finalScore");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* GAME STATE */
let bird, pipes, score, gameOver;

function resetGame() {
  bird = {
    x: 80,
    y: canvas.height / 2,
    velocity: 0,
    gravity: 0.5,
    jump: -8,
    size: 15
  };

  pipes = [];
  score = 0;
  gameOver = false;

  gameOverScreen.style.display = "none";
}

/* init */
resetGame();

/* pipes */
function addPipe() {
  if (gameOver) return;

  let gap = 170;
  let top = Math.random() * (canvas.height / 2) + 50;

  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + gap,
    width: 60,
    scored: false
  });
}

setInterval(addPipe, 1400);

/* input */
function flapOrRestart() {
  if (gameOver) {
    resetGame();
    return;
  }
  bird.velocity = bird.jump;
}

document.addEventListener("touchstart", flapOrRestart);
document.addEventListener("mousedown", flapOrRestart);

/* collision */
function hit(pipe) {
  return (
    bird.x + bird.size > pipe.x &&
    bird.x - bird.size < pipe.x + pipe.width &&
    (bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
  );
}

/* game loop */
function update() {
  if (gameOver) return;

  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  pipes.forEach(pipe => {
    pipe.x -= 4;

    if (hit(pipe)) {
      endGame();
    }

    if (!pipe.scored && pipe.x + pipe.width < bird.x) {
      score++;
      pipe.scored = true;
    }
  });

  pipes = pipes.filter(p => p.x > -100);

  if (bird.y > canvas.height || bird.y < 0) {
    endGame();
  }

  scoreEl.innerText = score;
}

/* game over */
function endGame() {
  gameOver = true;

  finalScore.innerText = "Score: " + score;
  gameOverScreen.style.display = "flex";
}

/* draw */
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* bird */
  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI * 2);
  ctx.fill();

  /* pipes */
  ctx.fillStyle = "green";
  pipes.forEach(pipe => {
    ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
  });
}

/* loop */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
