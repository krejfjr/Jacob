<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Portal</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#70c5ce, #d0f4ff);
  font-family: Arial;
}

canvas { display: block; }

#score {
  position: absolute;
  top: 15px;
  left: 15px;
  color: white;
  font-size: 22px;
}

#menu, #gameOver {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  background: rgba(0,0,0,0.5);
}

#gameOver { display: none; }

button {
  padding: 12px 20px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div id="score">0</div>

<div id="menu">
  <h1>Flappy Portal</h1>
  <button onclick="start()">Start</button>
</div>

<div id="gameOver">
  <h1 id="final">0</h1>
  <button onclick="backToMenu()">Menu</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

const menu = document.getElementById("menu");
const gameOverUI = document.getElementById("gameOver");
const final = document.getElementById("final");
const scoreUI = document.getElementById("score");

let W,H;
function resize(){
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* GAME STATE */
let bird, pipes, portals, score;
let started=false, over=false;
let speed = 4; // ✅ fixed speed

/* RESET */
function reset(){
  bird = {
    x: 80,
    y: H/2,
    v: 0,
    gravity: 0.5,
    flipped: false
  };

  pipes = [];
  portals = [];
  score = 0;
  over = false;
}

/* START */
function start(){
  menu.style.display="none";
  started=true;
  reset();
}

function backToMenu(){
  gameOverUI.style.display="none";
  menu.style.display="flex";
  started=false;
}

/* INPUT */
function tap(){
  if(!started) return;

  if(over){
    backToMenu();
    return;
  }

  bird.v = bird.flipped ? 8 : -8;
}
document.addEventListener("touchstart", tap);
document.addEventListener("mousedown", tap);

/* PIPE */
function addPipe(){
  if(!started||over) return;

  let gap=170;
  let top=Math.random()*(H/2)+50;

  pipes.push({
    x:W,
    top,
    bottom:top+gap,
    w:60,
    scored:false
  });
}

/* PORTAL */
function addPortal(){
  if(!started||over) return;

  let y = Math.random()*(H-200)+100;

  portals.push({
    x: W,
    y: y,
    r: 25,
    used: false
  });
}

setInterval(addPipe, 1400);
setInterval(addPortal, 4000);

/* COLLISION */
function hit(p){
  return (
    bird.x > p.x &&
    bird.x < p.x+p.w &&
    (bird.y < p.top || bird.y > p.bottom)
  );
}

/* PORTAL HIT */
function portalHit(p){
  let dx = bird.x - p.x;
  let dy = bird.y - p.y;
  return Math.sqrt(dx*dx + dy*dy) < p.r + 10;
}

/* UPDATE */
function update(){
  if(!started||over) return;

  bird.v += bird.gravity;
  bird.y += bird.v;

  pipes.forEach(p=>{
    p.x -= speed;

    if(hit(p)) end();

    if(!p.scored && p.x < bird.x){
      score++;
      p.scored=true;
    }
  });

  portals.forEach(p=>{
    p.x -= speed;

    if(!p.used && portalHit(p)){
      p.used = true;
      bird.gravity *= -1;
      bird.flipped = !bird.flipped;
    }
  });

  pipes = pipes.filter(p=>p.x>-100);
  portals = portals.filter(p=>p.x>-50);

  if(bird.y > H || bird.y < 0) end();

  scoreUI.innerText = score;
}

/* END */
function end(){
  over=true;
  final.innerText="Score: "+score;
  gameOverUI.style.display="flex";
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(bird.x,bird.y,12,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="green";
  pipes.forEach(p=>{
    ctx.fillRect(p.x,0,p.w,p.top);
    ctx.fillRect(p.x,p.bottom,p.w,H);
  });

  ctx.strokeStyle="purple";
  ctx.lineWidth=4;
  portals.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.stroke();
  });
}

/* LOOP */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
