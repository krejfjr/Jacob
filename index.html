<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLUX — Neon Flight</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–cyan: #00f5ff;
–magenta: #ff00aa;
–purple: #8b00ff;
–dark: #050810;
–darker: #020508;
–glow-cyan: 0 0 20px #00f5ff88, 0 0 60px #00f5ff44;
–glow-magenta: 0 0 20px #ff00aa88, 0 0 60px #ff00aa44;
}

body {
background: var(–darker);
display: flex;
align-items: center;
justify-content: center;
height: 100vh;
overflow: hidden;
font-family: ‘Rajdhani’, sans-serif;
}

#wrapper {
position: relative;
width: 420px;
height: 680px;
}

canvas {
display: block;
border-radius: 12px;
border: 1px solid #00f5ff22;
box-shadow: 0 0 40px #00f5ff18, 0 0 120px #00f5ff08, inset 0 0 60px #00000088;
}

/* ── Overlay Screens ── */
.screen {
position: absolute;
inset: 0;
border-radius: 12px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 0;
background: linear-gradient(160deg, #050810ee 0%, #0a0518ee 100%);
backdrop-filter: blur(4px);
transition: opacity .4s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; }

.screen-badge {
font-family: ‘Orbitron’, monospace;
font-size: 11px;
letter-spacing: 6px;
color: var(–cyan);
text-transform: uppercase;
margin-bottom: 10px;
opacity: .7;
}

.screen-title {
font-family: ‘Orbitron’, monospace;
font-size: 52px;
font-weight: 900;
background: linear-gradient(135deg, var(–cyan), var(–magenta));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1;
letter-spacing: -1px;
text-shadow: none;
filter: drop-shadow(0 0 20px #00f5ff66);
margin-bottom: 6px;
}

.screen-sub {
font-family: ‘Rajdhani’, sans-serif;
font-size: 13px;
letter-spacing: 3px;
color: #ffffff55;
text-transform: uppercase;
margin-bottom: 48px;
}

.hint {
font-family: ‘Rajdhani’, sans-serif;
font-size: 14px;
letter-spacing: 2px;
color: #ffffff44;
margin-top: 32px;
animation: pulse 2s ease-in-out infinite;
}

.btn {
font-family: ‘Orbitron’, monospace;
font-size: 13px;
letter-spacing: 4px;
text-transform: uppercase;
color: var(–dark);
background: linear-gradient(135deg, var(–cyan), #00aaff);
border: none;
padding: 14px 40px;
border-radius: 4px;
cursor: pointer;
transition: transform .15s, box-shadow .15s;
box-shadow: var(–glow-cyan);
}
.btn:hover { transform: scale(1.04); box-shadow: 0 0 30px #00f5ffaa, 0 0 80px #00f5ff55; }
.btn:active { transform: scale(.97); }

/* Death screen */
#death-screen .score-display {
display: flex;
flex-direction: column;
align-items: center;
margin-bottom: 36px;
}
#death-screen .score-label {
font-family: ‘Orbitron’, monospace;
font-size: 11px;
letter-spacing: 5px;
color: #ffffff44;
margin-bottom: 6px;
}
#death-screen .score-value {
font-family: ‘Orbitron’, monospace;
font-size: 72px;
font-weight: 900;
background: linear-gradient(135deg, #fff, var(–cyan));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 0 14px #00f5ff88);
line-height: 1;
}
#death-screen .best-label {
font-size: 12px;
letter-spacing: 3px;
color: var(–magenta);
margin-top: 8px;
font-family: ‘Rajdhani’, sans-serif;
opacity: .8;
}

.divider {
width: 120px;
height: 1px;
background: linear-gradient(90deg, transparent, var(–cyan), transparent);
margin: 20px 0;
opacity: .4;
}

#hud {
position: absolute;
top: 20px;
left: 0; right: 0;
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 0 24px;
pointer-events: none;
}

#score-hud {
font-family: ‘Orbitron’, monospace;
font-size: 36px;
font-weight: 900;
color: #fff;
filter: drop-shadow(0 0 12px #00f5ffcc);
line-height: 1;
}
#speed-hud {
font-family: ‘Orbitron’, monospace;
font-size: 10px;
letter-spacing: 3px;
color: var(–cyan);
opacity: .6;
text-align: right;
margin-top: 6px;
}

/* ── Difficulty selector ── */
.diff-row {
display: flex;
gap: 10px;
margin-bottom: 10px;
}
.diff-btn {
font-family: ‘Orbitron’, monospace;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
border: 1.5px solid;
background: transparent;
padding: 10px 18px;
border-radius: 4px;
cursor: pointer;
transition: transform .15s, background .15s, box-shadow .15s;
}
.diff-btn.easy   { color: #00ff88; border-color: #00ff88; }
.diff-btn.medium { color: #ffcc00; border-color: #ffcc00; }
.diff-btn.hard   { color: #ff3355; border-color: #ff3355; }
.diff-btn.easy:hover,   .diff-btn.easy.active   { background: #00ff8833; box-shadow: 0 0 22px #00ff88aa; transform: scale(1.05); }
.diff-btn.medium:hover, .diff-btn.medium.active { background: #ffcc0033; box-shadow: 0 0 22px #ffcc00aa; transform: scale(1.05); }
.diff-btn.hard:hover,   .diff-btn.hard.active   { background: #ff335533; box-shadow: 0 0 22px #ff3355aa; transform: scale(1.05); }

#diff-hud {
font-family: ‘Orbitron’, monospace;
font-size: 9px;
letter-spacing: 3px;
text-align: right;
margin-top: 2px;
opacity: .7;
}
#diff-hud.easy   { color: #00ff88; }
#diff-hud.medium { color: #ffcc00; }
#diff-hud.hard   { color: #ff3355; }

@keyframes pulse {
0%, 100% { opacity: .3; }
50% { opacity: .7; }
}
@keyframes flicker {
0%, 100% { opacity: 1; }
92% { opacity: 1; }
93% { opacity: .4; }
94% { opacity: 1; }
97% { opacity: .6; }
98% { opacity: 1; }
}
</style>

</head>
<body>

<div id="wrapper">
  <canvas id="c" width="420" height="680"></canvas>

  <!-- HUD -->

  <div id="hud">
    <div id="score-hud">0</div>
    <div>
      <div id="speed-hud">SPEED ×1.0</div>
      <div id="diff-hud" class="easy">EASY</div>
    </div>
  </div>

  <!-- Start Screen -->

  <div class="screen" id="start-screen">
    <div class="screen-badge">Neon Flight</div>
    <div class="screen-title">FLUX</div>
    <div class="screen-sub">Survive the Grid</div>
    <div class="divider"></div>
    <div class="diff-row">
      <button class="diff-btn easy active" data-diff="easy">Easy</button>
      <button class="diff-btn medium" data-diff="medium">Medium</button>
      <button class="diff-btn hard" data-diff="hard">Hard</button>
    </div>
    <button class="btn" id="start-btn" style="margin-top:18px">LAUNCH</button>
    <div class="hint">SPACE · CLICK · TAP</div>
  </div>

  <!-- Death Screen -->

  <div class="screen hidden" id="death-screen">
    <div class="screen-badge">Game Over</div>
    <div class="score-display">
      <div class="score-label">Score</div>
      <div class="score-value" id="final-score">0</div>
      <div class="best-label" id="best-label"></div>
    </div>
    <button class="btn" id="restart-btn">RETRY</button>
    <button class="btn" id="menu-btn" style="margin-top:10px;background:transparent;color:#ffffff66;border:1px solid #ffffff22;box-shadow:none;font-size:11px;padding:10px 30px;">MENU</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreHud  = document.getElementById('score-hud');
const speedHud  = document.getElementById('speed-hud');
const diffHud   = document.getElementById('diff-hud');
const startScr  = document.getElementById('start-screen');
const deathScr  = document.getElementById('death-screen');
const finalScoreEl = document.getElementById('final-score');
const bestLabel    = document.getElementById('best-label');

// ── Difficulty settings ──
const DIFFICULTIES = {
  easy:   { gapBase: 175, gapMin: 130, label: 'EASY' },
  medium: { gapBase: 135, gapMin: 95,  label: 'MEDIUM' },
  hard:   { gapBase: 105, gapMin: 72,  label: 'HARD' },
};
let difficulty = 'easy';
let bestScores = { easy: 0, medium: 0, hard: 0 };

// Wire difficulty buttons on start screen
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
  });
});

let state = 'start'; // 'start' | 'play' | 'dead'
let score, best = 0, frame, pipes, particles, stars, bgStars;
let vy, birdY, birdX;

// ── Config ──
const BIRD_X   = 190;
const BIRD_R   = 14;
const GRAVITY  = 0.38;
const FLAP     = -7.2;
const PIPE_W   = 54;
const GAP_BASE = 175;
const BASE_SPD = 3.8;
const MAX_SPD  = BASE_SPD * 5;

let speed, gap;

// ── Stars ──
function makeStars() {
  bgStars = Array.from({length: 120}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + .2,
    a: Math.random(),
    speed: Math.random() * .4 + .1
  }));
}

// ── Init ──
function initGame() {
  score   = 0;
  frame   = 0;
  pipes   = [];
  particles = [];
  stars   = [];
  birdY   = H / 2;
  vy      = 0;
  speed   = BASE_SPD;
  gap     = DIFFICULTIES[difficulty].gapBase;
  scoreHud.textContent = '0';
  speedHud.textContent = 'SPEED ×1.0';
  diffHud.textContent  = DIFFICULTIES[difficulty].label;
  diffHud.className    = difficulty;
}

// ── Pipe factory ──
function spawnPipe() {
  const margin = 90;
  const topH = margin + Math.random() * (H - gap - margin * 2);
  pipes.push({ x: W + PIPE_W, topH, passed: false, hue: Math.random() > .5 ? 0 : 1 });
}

// ── Particle factory ──
function burst(x, y) {
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 5 + 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      r: Math.random() * 4 + 1,
      hue: Math.random() > .5 ? 180 : 320
    });
  }
}

// ── Trail particles ──
function addTrail() {
  if (frame % 2 === 0) {
    particles.push({
      x: BIRD_X - BIRD_R,
      y: birdY + (Math.random() - .5) * 10,
      vx: -(speed * .6 + Math.random()),
      vy: (Math.random() - .5) * .8,
      life: 1,
      r: Math.random() * 3 + 1,
      hue: 180,
      trail: true
    });
  }
}

// ── Draw Background ──
function drawBG() {
  // Deep space gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#030612');
  grad.addColorStop(1, '#07030f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Horizontal grid lines
  ctx.strokeStyle = '#00f5ff08';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  // Vertical grid lines (scrolling)
  const voff = (frame * speed * .35) % 60;
  for (let x = -voff; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  // Stars
  bgStars.forEach(s => {
    s.x -= s.speed * (speed / BASE_SPD) * .5;
    if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a * .8})`;
    ctx.fill();
  });

  // Scanline effect
  for (let y = 0; y < H; y += 4) {
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(0, y, W, 2);
  }
}

// ── Draw Pipe ──
function drawPipe(p) {
  const colors = p.hue === 0
    ? { c1: '#00f5ff', c2: '#0088cc', glow: '#00f5ff' }
    : { c1: '#aa00ff', c2: '#6600aa', glow: '#aa00ff' };

  const drawBar = (x, y, w, h) => {
    // Pipe body
    const g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0,   colors.c2 + '88');
    g.addColorStop(0.3, colors.c1);
    g.addColorStop(0.7, colors.c1);
    g.addColorStop(1,   colors.c2 + '88');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 4);
    ctx.fill();

    // Glow outline
    ctx.strokeStyle = colors.c1;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = colors.glow;
    ctx.shadowBlur = 18;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Edge cap highlight
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(x + 6, y + 2, 4, h - 4);

    // Cap strip
    const capH = 18, capX = x - 5, capW = w + 10;
    const cg = ctx.createLinearGradient(capX, 0, capX + capW, 0);
    cg.addColorStop(0, colors.c2 + '88');
    cg.addColorStop(0.5, colors.c1);
    cg.addColorStop(1, colors.c2 + '88');
    ctx.fillStyle = cg;
    const capY = (y + h === p.topH) ? y + h - capH : y;
    ctx.beginPath();
    ctx.roundRect(capX, capY, capW, capH, 3);
    ctx.fill();

    ctx.shadowColor = colors.glow;
    ctx.shadowBlur = 14;
    ctx.strokeStyle = colors.c1;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
  };

  drawBar(p.x, 0, PIPE_W, p.topH);
  drawBar(p.x, p.topH + gap, PIPE_W, H - p.topH - gap);

  // Gap glow
  const gg = ctx.createLinearGradient(p.x, p.topH, p.x, p.topH + gap);
  gg.addColorStop(0,   colors.c1 + '22');
  gg.addColorStop(0.5, colors.c1 + '06');
  gg.addColorStop(1,   colors.c1 + '22');
  ctx.fillStyle = gg;
  ctx.fillRect(p.x, p.topH, PIPE_W, gap);
}

// ── Draw Bird ──
function drawBird() {
  const angle = Math.max(-0.5, Math.min(1.0, vy * 0.055));
  ctx.save();
  ctx.translate(BIRD_X, birdY);
  ctx.rotate(angle);

  // Outer glow
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 30;

  // Body — diamond shape
  ctx.beginPath();
  ctx.moveTo(BIRD_R, 0);
  ctx.lineTo(0, -BIRD_R * .7);
  ctx.lineTo(-BIRD_R * .9, 0);
  ctx.lineTo(0, BIRD_R * .7);
  ctx.closePath();

  const bg = ctx.createLinearGradient(-BIRD_R, 0, BIRD_R, 0);
  bg.addColorStop(0, '#00aaff');
  bg.addColorStop(0.5, '#00f5ff');
  bg.addColorStop(1, '#ffffff');
  ctx.fillStyle = bg;
  ctx.fill();

  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner diamond
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(BIRD_R * .4, 0);
  ctx.lineTo(0, -BIRD_R * .3);
  ctx.lineTo(-BIRD_R * .4, 0);
  ctx.lineTo(0, BIRD_R * .3);
  ctx.closePath();
  ctx.fillStyle = '#ffffff88';
  ctx.fill();

  // Engine glow at tail
  const eg = ctx.createRadialGradient(-BIRD_R, 0, 0, -BIRD_R, 0, 10);
  eg.addColorStop(0, '#ff00aacc');
  eg.addColorStop(1, 'transparent');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.arc(-BIRD_R, 0, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ── Particles ──
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (!p.trail) p.vy += 0.15;
    p.life -= p.trail ? 0.08 : 0.04;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life * .85})`;
    ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ── Collision ──
function hit(p) {
  const bLeft = BIRD_X - BIRD_R + 4, bRight = BIRD_X + BIRD_R - 4;
  const bTop  = birdY  - BIRD_R + 4, bBot   = birdY  + BIRD_R - 4;
  const pRight = p.x + PIPE_W;
  if (bRight < p.x || bLeft > pRight) return false;
  return bTop < p.topH || bBot > p.topH + gap;
}

// ── Score bump effect ──
let scorePop = 0;
function popScore() {
  scorePop = 1;
}
function drawScorePop() {
  if (scorePop <= 0) return;
  const s = 1 + scorePop * .3;
  scoreHud.style.transform = `scale(${s})`;
  scoreHud.style.color = scorePop > .5 ? '#00f5ff' : '#fff';
  scorePop -= 0.08;
  if (scorePop <= 0) { scoreHud.style.transform = ''; scoreHud.style.color = '#fff'; }
}

// ── Main Loop ──
let animId;
function loop() {
  if (state !== 'play') return;
  frame++;

  // Speed ramp: every 5 points increase speed slightly
  speed = Math.min(MAX_SPD, BASE_SPD + score * 0.08);
  gap   = Math.max(DIFFICULTIES[difficulty].gapMin, DIFFICULTIES[difficulty].gapBase - score * 1.2);
  speedHud.textContent = `SPEED ×${(speed / BASE_SPD).toFixed(1)}`;

  // Bird physics
  vy += GRAVITY;
  birdY += vy;

  // Floor / ceiling
  if (birdY + BIRD_R >= H || birdY - BIRD_R <= 0) {
    die();
    return;
  }

  // Spawn pipes
  if (frame % Math.round(90 - score * .5 < 52 ? 52 : 90 - score * .5) === 0) {
    spawnPipe();
  }

  // Update & check pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= speed;
    if (!pipes[i].passed && pipes[i].x + PIPE_W < BIRD_X) {
      pipes[i].passed = true;
      score++;
      scoreHud.textContent = score;
      popScore();
    }
    if (hit(pipes[i])) { die(); return; }
    if (pipes[i].x + PIPE_W < -20) pipes.splice(i, 1);
  }

  // Trail
  addTrail();

  // Draw
  drawBG();
  pipes.forEach(drawPipe);
  updateParticles();
  drawBird();
  drawScorePop();

  animId = requestAnimationFrame(loop);
}

function flap() {
  if (state === 'start') {
    startGame();
    return;
  }
  if (state === 'play') {
    vy = FLAP;
  }
}

function startGame() {
  initGame();
  state = 'play';
  startScr.classList.add('hidden');
  deathScr.classList.add('hidden');
  loop();
}

function die() {
  state = 'dead';
  burst(BIRD_X, birdY);
  cancelAnimationFrame(animId);

  // Shake
  const wrapper = document.getElementById('wrapper');
  wrapper.style.animation = 'none';
  wrapper.offsetHeight;
  wrapper.style.animation = 'shake .35s ease';

  if (score > bestScores[difficulty]) bestScores[difficulty] = score;
  finalScoreEl.textContent = score;
  bestLabel.textContent = bestScores[difficulty] > 0 ? `BEST  ${bestScores[difficulty]}` : '';

  // Linger on death frame
  setTimeout(() => {
    drawBG();
    pipes.forEach(drawPipe);
    updateParticles();
    deathScr.classList.remove('hidden');
  }, 180);
}

// ── Input ──
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
document.getElementById('start-btn').addEventListener('click', e => { e.stopPropagation(); startGame(); });
document.getElementById('restart-btn').addEventListener('click', e => { e.stopPropagation(); startGame(); });
document.getElementById('menu-btn').addEventListener('click', e => {
  e.stopPropagation();
  state = 'start';
  deathScr.classList.add('hidden');
  startScr.classList.remove('hidden');
  idleLoop();
});

// Shake keyframe
const styleEl = document.createElement('style');
styleEl.textContent = `
@keyframes shake {
  0%   { transform: translate(0,0) rotate(0deg); }
  20%  { transform: translate(-6px,3px) rotate(-.5deg); }
  40%  { transform: translate(5px,-3px) rotate(.4deg); }
  60%  { transform: translate(-4px,2px) rotate(-.3deg); }
  80%  { transform: translate(3px,-1px) rotate(.2deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}`;
document.head.appendChild(styleEl);

// ── Boot ──
makeStars();
initGame();

// Idle animation on start screen
function idleLoop() {
  if (state !== 'start') return;
  drawBG();
  // Animate bird bobbing
  const t = Date.now() / 1000;
  birdY = H / 2 + Math.sin(t * 2) * 12;
  vy = Math.cos(t * 2) * 3;
  addTrail();
  updateParticles();
  drawBird();
  requestAnimationFrame(idleLoop);
}
idleLoop();
</script>

</body>
</html>
