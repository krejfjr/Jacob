<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Iakov Komlyk</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* GLOBAL FIX */
html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  cursor: pointer;

  /* remove mobile safe-area gaps */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);

  /* 🌑 subtle animated luxury background */
  background: linear-gradient(-45deg, #000000, #1a1a1a, #0a1a2f, #111111);
  background-size: 400% 400%;
  animation: bgShift 18s ease infinite;
}

/* BACKGROUND ANIMATION */
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  25%  { background-position: 50% 50%; }
  50%  { background-position: 100% 50%; }
  75%  { background-position: 50% 50%; }
  100% { background-position: 0% 50%; }
}

/* NAME */
.name {
  font-family: 'Cinzel', serif;
  font-size: 4.5rem;
  color: white;
  letter-spacing: 4px;
  opacity: 0;
  animation: fadeIn 2.5s ease forwards;
  text-shadow: 0 0 25px rgba(255,255,255,0.12);
}

/* SUBTITLE */
.subtitle {
  margin-top: 18px;
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.5);
  opacity: 0;
  animation: fadeIn 3s ease forwards;
  animation-delay: 0.5s;
}

/* FADE IN */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* 🌊 RIPPLE EFFECT */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  background: rgba(255,255,255,0.12);
  filter: blur(6px);
  animation: ripple 0.8s ease-out;
  pointer-events: none;
}

@keyframes ripple {
  0% {
    transform: scale(0);
    opacity: 0.6;
  }
  100% {
    transform: scale(4.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="name">Iakov Komlyk</div>
<div class="subtitle">Personal Website</div>

<script>
let drawing = false;

function createRipple(x, y) {
  const ripple = document.createElement("span");

  ripple.className = "ripple";
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  ripple.style.width = "60px";
  ripple.style.height = "60px";

  document.body.appendChild(ripple);

  setTimeout(() => ripple.remove(), 800);
}

/* mouse */
document.addEventListener("mousedown", (e) => {
  drawing = true;
  createRipple(e.clientX, e.clientY);
});

document.addEventListener("mousemove", (e) => {
  if (drawing) createRipple(e.clientX, e.clientY);
});

document.addEventListener("mouseup", () => drawing = false);

/* touch */
document.addEventListener("touchstart", (e) => {
  drawing = true;
  const t = e.touches[0];
  createRipple(t.clientX, t.clientY);
});

document.addEventListener("touchmove", (e) => {
  if (drawing) {
    const t = e.touches[0];
    createRipple(t.clientX, t.clientY);
  }
});

document.addEventListener("touchend", () => {
  drawing = false;
});
</script>

</body>
</html>
