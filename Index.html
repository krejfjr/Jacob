<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iakov Komlyk</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #00c9a7, #00b4d8, #48cae4, #0077b6);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* floating particles */
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) translateX(50px);
        opacity: 0;
      }
    }

    .container {
      text-align: center;
      z-index: 2;
      position: relative;
    }

    h1 {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-shadow: 0 0 25px rgba(0,0,0,0.3);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
      to { text-shadow: 0 0 30px rgba(255,255,255,0.6); }
    }

    .subtitle {
      margin-top: 15px;
      font-size: 1.2rem;
      font-weight: 300;
      opacity: 0.9;
      letter-spacing: 2px;
    }

    .typing {
      margin-top: 20px;
      font-size: 1rem;
      opacity: 0.8;
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 4s steps(40) forwards, blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 280px }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* glow circle behind text */
    .circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 1;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

  </style>
</head>

<body>

  <!-- glow background circle -->
  <div class="circle"></div>

  <!-- main content -->
  <div class="container">
    <h1>Iakov Komlyk</h1>
    <div class="subtitle">Personal Website</div>
    <div class="typing">Welcome to my digital space...</div>
  </div>

  <script>
    // create floating particles
    for (let i = 0; i < 25; i++) {
      let particle = document.createElement("div");
      particle.classList.add("particle");

      particle.style.left = Math.random() * 100 + "vw";
      particle.style.animationDuration = (5 + Math.random() * 10) + "s";
      particle.style.opacity = Math.random();

      document.body.appendChild(particle);
    }
  </script>

</body>
</html>
